<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Shift List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-hover: #4f46e5;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1f2937; --text-muted: #6b7280;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); background-attachment: fixed; min-height: 100vh; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; color: var(--text-main); }
        .container { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 25px 20px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); width: 100%; max-width: 450px; margin-top: 2vh; overflow: hidden; }
        h2 { text-align: center; margin-top: 0; font-weight: 700; color: var(--primary); user-select: none; letter-spacing: -0.5px; }
        .info-bar { display: flex; justify-content: space-between; font-size: 0.85em; font-weight: 500; color: var(--text-muted); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px dashed rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 12px; margin-bottom: 24px; }
        input[type="text"] { flex: 1; padding: 12px 16px; border: 2px solid transparent; background: rgba(255,255,255,0.9); border-radius: 12px; font-size: 0.95em; font-family: 'Poppins', sans-serif; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        button { padding: 12px 20px; border: none; border-radius: 12px; background-color: var(--primary); color: white; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.2s; }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .btn-cancel { background-color: var(--danger); }
        .btn-cancel:hover { background-color: #DC2626; }
        .list-section { margin-bottom: 24px; }
        .list-title { font-size: 0.85em; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        ul { list-style-type: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        li { padding: 12px 16px; background-color: rgba(255,255,255,0.8); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-size: 0.95em; }
        .main-slot { border-left: 5px solid var(--success); }
        .waitlist-slot { border-left: 5px solid var(--warning); opacity: 0.85; }
        .status-msg { text-align: center; color: var(--danger); font-weight: 600; font-size: 0.9em; margin-bottom: 15px; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 8px; display: none; }
        .status-msg:not(:empty) { display: block; }
        @media (max-width: 480px) { .input-group { flex-direction: column; } #submitBtn { width: 100%; } li { flex-direction: column; align-items: flex-start; gap: 10px; } .btn-cancel { width: 100%; } }
        .chat-container { margin-top: 20px; border-top: 2px dashed rgba(0,0,0,0.1); padding-top: 15px; }
        .chat-box { background: rgba(255,255,255,0.6); height: 160px; overflow-y: auto; border-radius: 12px; padding: 10px; margin-bottom: 10px; font-size: 0.85em; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { background: white; padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); }
        .chat-msg b { color: var(--primary); }
        .chat-msg span { font-size: 0.7em; color: var(--text-muted); float: right; margin-top: 3px; }
        .chat-input-group { display: flex; flex-direction: row !important; gap: 8px; width: 100%; }
        .chat-input-group input { flex: 1; min-width: 0; padding: 8px 12px; border-radius: 8px; border: 1px solid transparent; background: rgba(255,255,255,0.9); font-family: 'Poppins', sans-serif; }
        .chat-input-group button { flex-shrink: 0; padding: 8px 15px; border-radius: 8px; background: var(--success); width: auto !important; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 Shift Roster</h2>
    <div class="info-bar">
        <span id="slotsCount">Slots: 0 / 16</span>
        <span id="cutoffStatus">Loading...</span>
    </div>

    <div id="statusMessage" class="status-msg"></div>

    <div class="input-group" id="inputSection" style="display: none;">
        <input type="text" id="nameInput" placeholder="Enter your name..." autocomplete="off">
        <button id="submitBtn" onclick="addName()">Join List</button>
    </div>

    <div class="list-container">
        <div class="list-section" id="mainListSection">
            <div class="list-title">Main List</div>
            <ul id="mainList"></ul>
        </div>
        <div class="list-section" id="waitlistSection" style="display: none;">
            <div class="list-title" style="border-color: #F59E0B;">Waitlist</div>
            <ul id="waitlist"></ul>
        </div>
    </div>

    <div class="chat-container">
        <div class="list-title">💬 Agent Lounge</div>
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input-group">
            <input type="text" id="chatInput" placeholder="Message... (Type name above first)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, set, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmWM-TT9M41lt1O3YgPZYOi5W8JzUV-_g",
      authDomain: "teamlistmanager-647d4.firebaseapp.com",
      databaseURL: "https://teamlistmanager-647d4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "teamlistmanager-647d4",
      storageBucket: "teamlistmanager-647d4.firebasestorage.app",
      messagingSenderId: "70023920416",
      appId: "1:70023920416:web:cac334e7a7229bba7b7545"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const listRef = ref(db, 'attendance_list');
    const logsRef = ref(db, 'system_logs');
    const chatRef = ref(db, 'chat_messages');
    const settingsRef = ref(db, 'settings');

    let currentMaxSlots = 16;
    let isListOpen = false;
    let currentData = [];

    if(!localStorage.getItem('deviceId')) {
        localStorage.setItem('deviceId', 'device_' + Math.random().toString(36).substr(2, 9));
    }
    const myDeviceId = localStorage.getItem('deviceId');

    const nameInput = document.getElementById('nameInput');
    const statusMessage = document.getElementById('statusMessage');
    const inputSection = document.getElementById('inputSection');

    onValue(settingsRef, (snapshot) => {
        const data = snapshot.val();
        if(data) {
            currentMaxSlots = data.maxSlots || 16;
            isListOpen = data.isListOpen !== undefined ? data.isListOpen : false;
        }

        let statusDisplay = document.getElementById('cutoffStatus');
        statusDisplay.innerText = isListOpen ? "🟢 LIST IS OPEN" : "🔴 LIST IS CLOSED";
        statusDisplay.style.color = isListOpen ? "var(--success)" : "var(--danger)";
        statusDisplay.style.fontWeight = "bold";

        refreshInputUI();
        renderList(); // Re-render to adjust slots display if changed
    });

    let myEntryId = null;

    onValue(listRef, (snapshot) => {
        const data = snapshot.val();
        currentData = [];
        myEntryId = null;
        
        if (data) {
            for (let id in data) currentData.push({ id, ...data[id] });
            currentData.sort((a, b) => a.timestamp - b.timestamp);
        }
        renderList();
        refreshInputUI();
    });

    function renderList() {
        const mainListUI = document.getElementById('mainList');
        const waitlistUI = document.getElementById('waitlist');
        mainListUI.innerHTML = ''; waitlistUI.innerHTML = '';
        let mainCount = 0, waitCount = 0;

        currentData.forEach((entry, index) => {
            if(entry.deviceId === myDeviceId) myEntryId = entry.id;
            const li = document.createElement('li');
            let slotNumber = index + 1;
            let timeString = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
            
            let cancelBtnHTML = '';
            if(entry.deviceId === myDeviceId) {
                cancelBtnHTML = `<button class="btn-cancel" style="padding: 4px 8px; font-size: 0.8em;" onclick="removeName('${entry.id}', '${entry.name}')">Cancel</button>`;
            }

            if (slotNumber <= currentMaxSlots) {
                mainCount++; li.className = 'main-slot';
                li.innerHTML = `<span style="flex:1;"><b>${slotNumber}.</b> ${entry.name} <span style="font-size: 0.8em; color: var(--text-muted);">(${timeString})</span></span> ${cancelBtnHTML}`;
                mainListUI.appendChild(li);
            } else {
                waitCount++; li.className = 'waitlist-slot';
                li.innerHTML = `<span style="flex:1;"><b>W${waitCount}.</b> ${entry.name} <span style="font-size: 0.8em; color: var(--text-muted);">(${timeString})</span></span> ${cancelBtnHTML}`;
                waitlistUI.appendChild(li);
            }
        });

        document.getElementById('slotsCount').innerText = `Slots: ${mainCount} / ${currentMaxSlots}`;
        document.getElementById('waitlistSection').style.display = waitCount > 0 ? 'block' : 'none';
    }

    function refreshInputUI() {
        if (!isListOpen) {
            statusMessage.innerText = "System Closed. Naka-lock pa ang listahan.";
            inputSection.style.display = 'none';
        } else if (myEntryId) {
            statusMessage.innerText = "You are already on the list!";
            statusMessage.style.color = "var(--success)";
            inputSection.style.display = 'none';
        } else {
            statusMessage.innerText = "";
            inputSection.style.display = 'flex';
        }
    }

    window.addName = function() {
        if(!isListOpen) return alert("Naka-close po ang list.");
        let name = nameInput.value.trim();
        if(!name) return alert("Enter your name!");
        if(currentData.some(e => e.name.toLowerCase() === name.toLowerCase())) return alert("Nandito na ang pangalang ito.");

        push(listRef, { name: name, deviceId: myDeviceId, timestamp: serverTimestamp() });
        push(logsRef, { action: "Added", name: name, time: serverTimestamp() });
    }

    window.removeName = function(id, name) {
        if(confirm("Are you sure you want to cancel your slot?")) {
            remove(ref(db, `attendance_list/${id}`));
            push(logsRef, { action: "Self-Canceled", name: name, time: serverTimestamp() });
        }
    }

    onValue(chatRef, (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = '';
        if(data) {
            let chats = [];
            for (let id in data) chats.push(data[id]);
            chats.sort((a,b) => a.timestamp - b.timestamp);
            chats.forEach(chat => {
                let time = chat.timestamp ? new Date(chat.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                chatBox.innerHTML += `<div class="chat-msg"><b>${chat.sender}:</b> ${chat.message} <span>${time}</span></div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    window.sendMessage = function() {
        let msgInput = document.getElementById('chatInput');
        let msg = msgInput.value.trim();
        let senderName = nameInput.value.trim() || "Agent";
        if(!msg) return;
        push(chatRef, { sender: senderName, message: msg, timestamp: serverTimestamp() });
        msgInput.value = '';
    }
</script>
</body>
</html>
